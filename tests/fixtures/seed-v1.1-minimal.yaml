schema_version: "1.1"
organ: Meta
repo: test-repo
org: meta-organvm
ownership:
  lead: "alice"
  collaborators:
    - handle: "bob"
      role: contributor
      access: [commit, pr]
      organs: [ORGAN-II]
      since: "2026-04-01"
    - handle: "carol"
      role: reviewer
      access: [commit, pr, promote]
      organs: [ORGAN-II, ORGAN-III]
  ai_agents:
    - type: claude
      access: [read, edit, pr]
      scope: "code and tests"
    - type: gemini
      access: [read, research]
      scope: "documentation"
review:
  promote_to_candidate:
    requires: [ci_pass, lead_approval]
  promote_to_public_process:
    requires: [ci_pass, lead_approval, code_review]
  promote_to_graduated:
    requires: [ci_pass, organ_lead_approval, stranger_test]
produces:
  - type: governance-policy
    description: "Test policy"
    consumers: [META-ORGANVM]
